name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to package (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    name: Build release assets
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Validate prebuilt payload
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          if (!(Test-Path release/payload/RadioChatter.dll)) { throw "release/payload/RadioChatter.dll is missing. Create tags with tools/new_release_tag.ps1." }
          if (!(Test-Path release/payload/sidecar/server.py)) { throw "release/payload/sidecar/server.py is missing." }
          if (!(Test-Path release/payload/sidecar/run_sidecar.bat)) { throw "release/payload/sidecar/run_sidecar.bat is missing." }
          if (!(Test-Path release/payload/sidecar/run_sidecar.sh)) { throw "release/payload/sidecar/run_sidecar.sh is missing." }

      - name: Restore bundled model cache
        id: model-cache
        uses: actions/cache@v4
        with:
          path: dist/model-cache
          key: radiochatter-model-bundle-${{ hashFiles('tools/prepare_model_bundle.py', 'installer/models/MODEL_LICENSES.txt') }}

      - name: Install model download helper
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: python -m pip install huggingface-hub==1.22.0

      - name: Prepare bundled model cache
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: python tools/prepare_model_bundle.py --output dist/model-cache

      - name: Verify bundled model cache
        run: python tools/prepare_model_bundle.py --output dist/model-cache --verify-only

      - name: Build installers from prebuilt payload
        shell: powershell
        run: python tools/package_github_release.py --skip-build --payload-source release/payload --model-cache dist/model-cache --version "${{ inputs.tag || github.ref_name }}"

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          fail_on_unmatched_files: true
          files: |
            dist/RadioChatter-*-Setup.exe
            dist/RadioChatter-*-Setup-WithModels.exe
            dist/RadioChatter-*-linux.zip
            dist/RadioChatter-*-linux-with-models.zip
