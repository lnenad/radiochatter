name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  logic-tests:
    name: Logic tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Run logic tests
        run: dotnet run --project tests/RadioChatter.LogicTests -c Release

      - name: Syntax-check sidecar
        run: python -m py_compile sidecar/server.py
